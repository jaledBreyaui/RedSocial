<article
  class="post"
  [class.navigable]="navegable()"
  [attr.tabindex]="navegable() ? 0 : null"
  [attr.role]="navegable() ? 'link' : null"
  (click)="abrirDetalle()"
  (keydown.enter)="abrirDetalle()"
>
  <div class="avatar" [class.has-image]="avatarUrl">
    @if (avatarUrl) {
      <img [src]="avatarUrl" [alt]="'Avatar de ' + post.author.name" />
    } @else {
      <span>{{ authorInitials }}</span>
    }
  </div>

  <div class="post-body">
    <header class="post-header">
      <div class="author-line">
        <strong>{{ post.author.name }} {{ post.author.lastName }}</strong>
        <span>{{ username }}</span>
        @if (createdAtLabel) {
          <span aria-hidden="true">·</span>
          <time
            [attr.datetime]="post.createdAt"
            [attr.title]="createdAtExactLabel + ' hs'"
          >
            {{ createdAtLabel }}
          </time>
        }
      </div>

      @if (isOwnPost()) {
        <button
          type="button"
          class="more-button delete-button"
          [disabled]="eliminando()"
          aria-label="Eliminar publicación"
          (click)="eliminarPost($event)"
        >
          <i class="pi pi-trash" aria-hidden="true"></i>
        </button>
      }
    </header>

    <p class="post-content">{{ post.content }}</p>

    @if (imageUrl) {
      <img
        class="post-image"
        [src]="imageUrl"
        [alt]="'Imagen publicada por ' + post.author.name"
      />
    }

    <footer class="post-actions">
      <button
        type="button"
        aria-label="Responder publicación"
        (click)="detenerNavegacion($event); crearComentario.abrir()"
      >
        <i class="pi pi-comment" aria-hidden="true"></i>
        @if (commentsCount() > 0) {
          <span>{{ commentsCount() }}</span>
        }
      </button>

      <button
        type="button"
        class="like-button"
        [class.liked]="liked()"
        [disabled]="actualizandoLike()"
        [attr.aria-label]="liked() ? 'Quitar me gusta' : 'Me gusta'"
        [attr.aria-pressed]="liked()"
        (click)="detenerNavegacion($event); toggleLike()"
      >
        <i
          class="pi"
          [class.pi-heart]="!liked()"
          [class.pi-heart-fill]="liked()"
          aria-hidden="true"
        ></i>
        <span>{{ likesCount() }}</span>
      </button>
    </footer>
  </div>
</article>

<app-crearcomentario
  #crearComentario
  [post]="post"
  (comentarioCreado)="comentarioCreado($event)"
/>

<p-confirmdialog styleClass="delete-confirm-dialog" />
